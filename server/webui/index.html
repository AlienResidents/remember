<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REMEMBER — Recursive Enhanced Memory by Enhanced Recall</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Science+Gothic:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated background -->
    <div class="bg-grid"></div>
    <div class="bg-particles" id="particles"></div>
    
    <!-- Main container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 100 100" class="logo-svg">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="var(--neon-cyan)" stroke-width="2" class="logo-ring"/>
                        <circle cx="50" cy="50" r="35" fill="none" stroke="var(--neon-purple)" stroke-width="1.5" class="logo-ring-inner"/>
                        <path d="M30 50 L50 30 L70 50 L50 70 Z" fill="none" stroke="var(--neon-cyan)" stroke-width="2" class="logo-diamond"/>
                        <circle cx="50" cy="50" r="8" fill="var(--neon-cyan)" class="logo-core"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>REMEMBER</h1>
                    <p class="subtitle">Recursive Enhanced Memory by Enhanced Recall</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-icon" id="theme-toggle" title="Toggle theme">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main content -->
        <main class="main-content">
            <!-- Search panel -->
            <section class="panel search-panel">
                <div class="panel-header">
                    <h2><span class="icon">⌕</span> Search Memory</h2>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search memories... (e.g., 'harbor postgres backup')" autocomplete="off">
                    <button class="btn btn-primary" id="search-btn">
                        <span class="btn-text">Search</span>
                        <span class="btn-loader"></span>
                    </button>
                </div>
                <div class="search-filters">
                    <select id="filter-type">
                        <option value="">All Types</option>
                        <option value="project">Project</option>
                        <option value="reference">Reference</option>
                    </select>
                    <select id="filter-status">
                        <option value="">All Status</option>
                        <option value="active">Active</option>
                        <option value="archived">Archived</option>
                        <option value="disputed">Disputed</option>
                    </select>
                </div>
            </section>

            <!-- Results panel -->
            <section class="panel results-panel">
                <div class="panel-header">
                    <h2><span class="icon">◈</span> Results <span class="count" id="result-count">0</span></h2>
                </div>
                <div class="results-list" id="results-list">
                    <div class="empty-state">
                        <div class="empty-icon">◇</div>
                        <p>No memories found. Search above to begin.</p>
                    </div>
                </div>
            </section>

            <!-- Memory detail panel -->
            <section class="panel detail-panel" id="detail-panel" style="display: none;">
                <div class="panel-header">
                    <h2><span class="icon">◉</span> Memory Detail</h2>
                    <div class="detail-actions">
                        <button class="btn btn-sm" id="verify-btn">✓ Verify</button>
                        <button class="btn btn-sm" id="archive-btn">⊘ Archive</button>
                        <button class="btn btn-sm btn-danger" id="refute-btn">✗ Refute</button>
                    </div>
                </div>
                <div class="detail-content" id="detail-content">
                    <!-- Populated dynamically -->
                </div>
            </section>

            <!-- Create memory panel -->
            <section class="panel create-panel">
                <div class="panel-header">
                    <h2><span class="icon">+</span> Create Memory</h2>
                </div>
                <form id="create-form">
                    <div class="form-group">
                        <label for="mem-name">Name</label>
                        <input type="text" id="mem-name" placeholder="e.g., arc-runners-troubleshooting" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="mem-type">Type</label>
                            <select id="mem-type">
                                <option value="project">Project</option>
                                <option value="reference">Reference</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="mem-tags">Tags (comma-separated)</label>
                            <input type="text" id="mem-tags" placeholder="e.g., arc, eks, troubleshooting">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="mem-desc">Description</label>
                        <input type="text" id="mem-desc" placeholder="Brief summary of this memory" required>
                    </div>
                    <div class="form-group">
                        <label for="mem-body">Body (Markdown)</label>
                        <textarea id="mem-body" rows="10" placeholder="# Title&#10;&#10;Content here..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        <span class="btn-text">Save Memory</span>
                        <span class="btn-loader"></span>
                    </button>
                </form>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>REMEMBER v0.1.0 — Recursive Enhanced Memory by Enhanced Recall</p>
            <p class="footer-note">Powered by FastMCP • PostgreSQL + pgvector</p>
        </footer>
    </div>

    <!-- Toast notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
